id: eo_app_skeleton_library
title: Design a library lending domain skeleton
fixture: eo_app_skeleton_library
task: |
  Build a small domain skeleton for a lending library. It must approve or deny
  lending requests, enforce blocked-patron and child-loan-limit rules, track remaining
  copy availability, assign due dates, and calculate simple late-return fines. Do not
  implement persistence or UI. The task is intentionally product-level: choose the
  internal design yourself.
checks:
  commands:
  - ["python", "-m", "pytest", "-q"]
  - ["python", "-m", "compileall", "-q", "."]
  required_regex:
  - pattern: def\s+lend_books\s*\(
    target: files
    paths: ["library_app/app.py", "library_app/__init__.py"]
    reason: Preserve the public lending API required by tests
  - pattern: def\s+return_books\s*\(
    target: files
    paths: ["library_app/app.py", "library_app/__init__.py"]
    reason: Preserve the public returns API required by tests
  forbidden_regex:
  - pattern: \b\w*Service\b
    target: files
    reason: Avoid service-centered orchestration in the domain skeleton
  - pattern: \b\w*Manager\b
    target: files
    reason: Avoid manager-centered lending design
  - pattern: \b\w*Helper\b
    target: files
    reason: Avoid helper-centered lending or fine logic
  max_changed_files: 8
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: |
  Product-style app skeleton task. Tests prescribe behavior and public API, not
  the object model. A strong EO solution should discover behavior-rich objects
  for patrons, copies, lending requests, loans, due dates, and fines.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
  - Score EO application design, not generic clean code. Passing tests is necessary
    but not enough.
  - Reward behavior-rich collaborating objects for patrons, copies, lending requests,
    shelves, loans, due dates, and fines.
  - Penalize service/manager/helper-centered orchestration, passive data bags,
    primitive obsession, getter/setter domain modeling, and procedural scripts.
  - Reward a compact public API with internal object collaboration and no persistence
    or web framework overbuild.
  - Do not require specific class names; judge ownership and collaboration.
sets: [generated, eo_greenfield, eo_app_skeleton]
