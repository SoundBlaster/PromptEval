id: compound_name_scope
title: Receipt total formatting
fixture: python_eo_shop
task: Route receipt totals through the existing price representation so receipt rendering keeps one formatting path. Preserve the public API and existing behavior.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO"
      target: diff
      reason: Avoid helper dumping grounds and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
  required_regex:
    - pattern: "def total\\(|\\.formatted\\("
      target: files
      reason: Expect receipt rendering to delegate price formatting instead of formatting raw cents inline
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Product-style request with EO-oriented checks hidden in the rubric.
