id: compound_name_scope
title: Receipt total formatting
fixture: python_eo_shop
task: Route receipt totals through the existing price representation so receipt rendering keeps one formatting path. Preserve the public API and existing behavior.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
    - ["python", "-m", "compileall", "-q", "."]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO|class \\w+(Reader|Parser|Validator|Calculator|Controller|Manager|Processor|Service)\\b"
      target: diff
      reason: Avoid procedural dumping grounds, job-title objects, and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
    - pattern: "def set_|\\.set[A-Z]"
      target: diff
      reason: Avoid setter-driven mutable domain state
  required_regex:
    - pattern: "def total\\(|\\.formatted\\("
      target: files
      reason: Expect receipt rendering to delegate price formatting instead of formatting raw cents inline
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Product-style request with EO-oriented checks hidden in the rubric.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
    - Receipt total formatting should be owned by a price/total concept, not external procedural code.
    - Compound names should not be mechanically renamed unless scope or ownership makes a simpler name natural.
    - The patch should preserve the public API and avoid broad unrelated refactoring.
