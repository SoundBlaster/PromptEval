id: scout_cleanup
title: Receipt maintenance cleanup
fixture: python_eo_shop
task: Improve the receipt total path while leaving unrelated files and behavior alone. Keep the change easy to review.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO"
      target: diff
      reason: Avoid helper dumping grounds and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
  required_regex:
    - pattern: "def total\\(|\\.formatted\\("
      target: files
      reason: Expect the change to move behavior to the existing price abstraction
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Product-style request with EO-oriented checks hidden in the rubric.
