id: constructor_work
title: constructor_work
fixture: python_eo_shop
task: Implement constructor_work behavior in EO style while preserving tests.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO"
      target: diff
      reason: Avoid helper dumping grounds and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
  required_regex:
    - pattern: "class .*Receipt|class .*Price|class .*Order"
      target: files
      reason: Expect object-focused behavior
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: EO-focused check for constructor_work.
