id: constructor_work
title: Small receipt refactor
fixture: python_eo_shop
task: Make the smallest maintainable change that gives receipts a single way to obtain their formatted total. Do not broaden the fixture beyond the receipt flow.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO"
      target: diff
      reason: Avoid helper dumping grounds and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
  required_regex:
    - pattern: "def total\\(|\\.formatted\\("
      target: files
      reason: Expect a small object method instead of duplicated formatting logic
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Product-style request with EO-oriented checks hidden in the rubric.
