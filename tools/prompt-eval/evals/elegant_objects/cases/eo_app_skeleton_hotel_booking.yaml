id: eo_app_skeleton_hotel_booking
title: Design a hotel booking domain skeleton
fixture: eo_app_skeleton_hotel_booking
task: |
  Build a small domain skeleton for hotel booking. It must quote stays with
  nightly pricing, weekend surcharges, cleaning fees, and member discounts; report
  unavailable nights; and reserve room inventory only after payment authorization.
  Do not implement persistence, UI, or payment integration. The task is
  intentionally product-level: choose the internal design yourself.
checks:
  commands:
  - ["python", "-m", "pytest", "-q"]
  - ["python", "-m", "compileall", "-q", "."]
  required_regex:
  - pattern: def\s+quote_stay\s*\(
    target: files
    paths: ["hotel_booking/app.py", "hotel_booking/__init__.py"]
    reason: Preserve the public quote API required by tests
  - pattern: def\s+reserve_stay\s*\(
    target: files
    paths: ["hotel_booking/app.py", "hotel_booking/__init__.py"]
    reason: Preserve the public reservation API required by tests
  forbidden_regex:
  - pattern: \b\w*Service\b
    target: files
    reason: Avoid service-centered orchestration in the domain skeleton
  - pattern: \b\w*Manager\b
    target: files
    reason: Avoid manager-centered booking design
  - pattern: \b\w*Helper\b
    target: files
    reason: Avoid helper-centered pricing or availability logic
  max_changed_files: 8
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: |
  Product-style app skeleton task. Tests prescribe behavior and public API, not
  the object model. A strong EO solution should discover behavior-rich objects
  for room types, nights, stays, guests, availability, quotes, and reservations.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
  - Score EO application design, not generic clean code. Passing tests is necessary
    but not enough.
  - Reward behavior-rich collaborating objects for pricing, stay nights, discounts,
    availability, payment-gated reservation, and remaining inventory.
  - Penalize service/manager/helper-centered orchestration, passive data bags,
    primitive obsession, getter/setter domain modeling, and procedural scripts.
  - Reward a compact public API with internal object collaboration and no persistence
    or web framework overbuild.
  - Do not require specific class names; judge ownership and collaboration.
  binary_evals:
  - id: ownership
    category: eo_adherence
    question: Does the patch keep pricing, availability, and reservation behavior inside focused domain objects rather than helper-style orchestration or passive data carriers?
    pass_condition: Core hotel-booking behavior is owned by collaborating domain objects with little helper-style coordination.
    fail_condition: Pricing, availability, or reservation rules are mostly coordinated through helpers, manager objects, or passive data bags.
  - id: local_api_scope
    category: scope_control
    question: Does the patch keep a compact public API while avoiding persistence, framework setup, or unrelated booking-platform overbuild?
    pass_condition: The change stays inside the small booking skeleton and public API required by tests.
    fail_condition: The patch adds unrelated infrastructure, broad layering, or unnecessary public surface beyond the required booking API.
sets: [generated, eo_greenfield, eo_app_skeleton, eo_app_skeleton_holdout]
