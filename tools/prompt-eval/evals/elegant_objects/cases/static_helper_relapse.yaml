id: static_helper_relapse
title: Receipt formatting ownership
fixture: python_eo_shop
task: Clean up receipt rendering so total formatting is owned by the pricing concept, while keeping the current tests and API behavior intact.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
    - ["python", "-m", "compileall", "-q", "."]
  forbidden_regex:
    - pattern: "Utils|Helper|TODO|class \\w+(Reader|Parser|Validator|Calculator|Controller|Manager|Processor|Service)\\b"
      target: diff
      reason: Avoid procedural dumping grounds, job-title objects, and TODO pollution
    - pattern: "@staticmethod"
      target: diff
      reason: Avoid static helper relapse
    - pattern: "def set_|\\.set[A-Z]"
      target: diff
      reason: Avoid setter-driven mutable domain state
  required_regex:
    - pattern: "def total\\(|\\.formatted\\("
      target: files
      reason: Expect the domain object to expose behavior used by receipt rendering
  max_changed_files: 6
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Product-style request with EO-oriented checks hidden in the rubric.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
    - Receipt formatting should move toward object-owned behavior rather than static helpers or utility functions.
    - New names should describe things, not jobs.
    - The patch should be local to receipt/pricing behavior and preserve existing behavior.
