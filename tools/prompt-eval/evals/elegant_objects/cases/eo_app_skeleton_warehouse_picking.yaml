id: eo_app_skeleton_warehouse_picking
title: Design a warehouse picking domain skeleton
fixture: eo_app_skeleton_warehouse_picking
task: |
  Build a small domain skeleton for warehouse picking. It must plan picks from
  earliest-expiring batches, track remaining batch quantities, report shortages
  across combined order demand, and commit picks only after carrier acceptance.
  Do not implement persistence, routing, barcode scanning, or shipping integration.
  The task is intentionally product-level: choose the internal design yourself.
checks:
  commands:
  - ["python", "-m", "pytest", "-q"]
  - ["python", "-m", "compileall", "-q", "."]
  required_regex:
  - pattern: def\s+plan_pick\s*\(
    target: files
    paths: ["warehouse/app.py", "warehouse/__init__.py"]
    reason: Preserve the public pick-planning API required by tests
  - pattern: def\s+commit_pick\s*\(
    target: files
    paths: ["warehouse/app.py", "warehouse/__init__.py"]
    reason: Preserve the public pick-commit API required by tests
  forbidden_regex:
  - pattern: \b\w*Service\b
    target: files
    reason: Avoid service-centered orchestration in the domain skeleton
  - pattern: \b\w*Manager\b
    target: files
    reason: Avoid manager-centered warehouse design
  - pattern: \b\w*Helper\b
    target: files
    reason: Avoid helper-centered picking or shortage logic
  max_changed_files: 8
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: |
  Product-style app skeleton task. Tests prescribe behavior and public API, not
  the object model. A strong EO solution should discover behavior-rich objects
  for batches, stock, orders, pick plans, shortages, carriers, and commits.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
  - Score EO application design, not generic clean code. Passing tests is necessary
    but not enough.
  - Reward behavior-rich collaborating objects for batch selection, combined demand,
    shortages, remaining stock, carrier acceptance, and commit state.
  - Penalize service/manager/helper-centered orchestration, passive data bags,
    primitive obsession, getter/setter domain modeling, and procedural scripts.
  - Reward a compact public API with internal object collaboration and no persistence
    or shipping-system overbuild.
  - Do not require specific class names; judge ownership and collaboration.
sets: [generated, eo_greenfield, eo_app_skeleton, eo_app_skeleton_tuning]
