id: eo_app_skeleton_meal_delivery
title: Design a meal delivery domain skeleton
fixture: eo_app_skeleton_meal_delivery
task: |
  Build a small domain skeleton for meal delivery. It must quote carts with zone
  delivery fees, loyalty discounts, item availability, and minimum-order rules;
  then place orders only when the kitchen is open and payment is authorized.
  Do not implement persistence, UI, courier routing, or payment integration. The
  task is intentionally product-level: choose the internal design yourself.
checks:
  commands:
  - ["python", "-m", "pytest", "-q"]
  - ["python", "-m", "compileall", "-q", "."]
  required_regex:
  - pattern: def\s+quote_delivery\s*\(
    target: files
    paths: ["meal_delivery/app.py", "meal_delivery/__init__.py"]
    reason: Preserve the public quote API required by tests
  - pattern: def\s+place_delivery_order\s*\(
    target: files
    paths: ["meal_delivery/app.py", "meal_delivery/__init__.py"]
    reason: Preserve the public order API required by tests
  forbidden_regex:
  - pattern: \b\w*Service\b
    target: files
    reason: Avoid service-centered orchestration in the domain skeleton
  - pattern: \b\w*Manager\b
    target: files
    reason: Avoid manager-centered delivery design
  - pattern: \b\w*Helper\b
    target: files
    reason: Avoid helper-centered cart or delivery logic
  max_changed_files: 8
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: |
  Product-style app skeleton task. Tests prescribe behavior and public API, not
  the object model. A strong EO solution should discover behavior-rich objects
  for dishes, menus, carts, destinations, customers, kitchens, payments, and orders.
judge:
  categories: [scope_control, eo_adherence, communication]
  criteria:
  - Score EO application design, not generic clean code. Passing tests is necessary
    but not enough.
  - Reward behavior-rich collaborating objects for item demand, availability,
    delivery fees, minimum-order rules, discounts, kitchen state, and payment-gated
    reservation.
  - Penalize service/manager/helper-centered orchestration, passive data bags,
    primitive obsession, getter/setter domain modeling, and procedural scripts.
  - Reward a compact public API with internal object collaboration and no persistence
    or delivery-platform overbuild.
  - Do not require specific class names; judge ownership and collaboration.
sets: [generated, eo_greenfield, eo_app_skeleton, eo_app_skeleton_tuning]
