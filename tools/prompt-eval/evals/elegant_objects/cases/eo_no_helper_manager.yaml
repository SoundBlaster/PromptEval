id: eo_no_helper_manager
fixture: eo_no_helper_manager
title: Refactor invoice calculation into focused objects, no helpers/managers
task: 'Replace broad orchestration classes (Manager/Helper) with focused domain objects.

  Keep behavior: subtotal, discount, tax and total calculation for an invoice.

  '
notes: 'The before version mixes orchestration and rules in a manager.

  The good solution should model discount and tax as focused value objects.

  The bad solution should continue to own business logic in a Helper or Manager class.

  '
