id: subscription_refund_scope
title: Subscription invoice scope control
fixture: python_subscription_billing
task: Add the loyalty discount support to subscription invoices only. The refund estimate flow is nearby and similar, but should remain behaviorally and structurally unchanged.
checks:
  commands:
    - ["python", "-m", "pytest", "-q"]
  forbidden_regex:
    - pattern: "diff --git a/billing/refunds.py b/billing/refunds.py"
      target: diff
      reason: Refund code is a distractor and should stay out of scope
    - pattern: "Utils|Helper|TODO|@staticmethod"
      target: diff
      reason: Avoid procedural helpers and placeholder comments in the invoice path
  required_regex:
    - pattern: "LoyaltyDiscount|discount_amount|loyalty_percent"
      target: files
      reason: Expect invoice-specific discount behavior and API exposure
  max_changed_files: 7
rubric:
  functional_correctness: 40
  scope_control: 20
  eo_adherence: 25
  verification: 10
  communication: 5
notes: Explicit distractor case to detect broad or opportunistic edits.
